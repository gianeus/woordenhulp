<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinder Woordenhulp AI</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(#fff7cc,#ffdfc9,#ffd0e1);
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #d96f00;
    font-size: 36px;
    margin-bottom: 24px;
    text-shadow: 1px 1px #ffffffaa;
  }

  .card {
    background: #fff8ee;
    padding: 20px;
    border-radius: 16px;
    border: 2px solid #ffb06a;
    max-width: 720px;
    margin: auto;
    box-shadow: 0 3px 8px #00000022;
  }

  input {
    padding: 12px;
    border: 2px solid #ffb06a;
    border-radius: 8px;
    width: 65%;
    font-size: 17px;
  }

  .btn {
    background: #ff8a3d;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-left: 8px;
  }

  .btn:hover {
    background: #ff7b1e;
  }

  .result {
    background: #fff3db;
    margin-top: 20px;
    padding: 18px;
    border-radius: 12px;
    border: 1px solid #ffb06a;
    box-shadow: 0 2px 5px #00000011;
    font-size: 17px;
  }

  strong {
    color: #d26700;
  }

  .muted {
    color: #6b7280;
    font-size: 12px;
    margin-top: 8px;
  }
</style>
</head>

<body>

<h1>Kinder Woordenhulp AI</h1>

<div class="card">
  <input id="wordInput" placeholder="Typ een woord...">
  <button class="btn" onclick="lookup()">Zoek</button>
  <div id="resultBox" class="muted">Tip: probeer woorden zoals “amateur”, “onderzoek”, “energie”.</div>
</div>

<script>
/* -----------------------------------------------------------
   1. Lokale woordenlijst
----------------------------------------------------------- */
const dictionary = {
  "atmosfeer": "De luchtlaag rondom de aarde.",
  "fossiel": "Een versteend overblijfsel van iets dat heel oud is.",
  "strategie": "Een slim plan om iets op een goede manier aan te pakken.",
  "experiment": "Een proefje dat je doet om iets te onderzoeken.",
  "energie": "De kracht die dingen laat bewegen of werken.",
  "onderzoek": "Stap voor stap iets uitzoeken om het beter te begrijpen.",
  "concentratie": "Je aandacht ergens volledig bij houden."
};

/* -----------------------------------------------------------
   2. WIKTIONARY NL API (met verbeterde betekenisextractie)
----------------------------------------------------------- */
async function fetchDutchMeaning(word) {
  try {
    const url =
      `https://nl.wiktionary.org/w/api.php?action=query&prop=extracts&format=json&origin=*&titles=${encodeURIComponent(word)}`;

    const response = await fetch(url);
    const data = await response.json();

    const pages = data?.query?.pages;
    const id = Object.keys(pages)[0];
    const extract = pages[id]?.extract;

    if (!extract) return null;

    const div = document.createElement("div");
    div.innerHTML = extract;

    const paragraphs = Array
      .from(div.querySelectorAll("p"))
      .map(p => p.innerText.trim())
      .filter(t => t.length > 0);

    if (paragraphs.length === 0) return null;

    // Filter grammar-only lines zoals “de amateur m”
    const meaning = paragraphs.find(t =>
      !/^(de|het)\s+[a-zA-Z]/i.test(t) &&
      t.length > 20 &&
      !t.startsWith("Afkomstig van") &&
      !t.startsWith("Zie ook")
    );

    return meaning || null;
  } catch (e) {
    return null;
  }
}

/* -----------------------------------------------------------
   3. AI fallback (werkt offline)
----------------------------------------------------------- */
function detectCategory(w) {
  if (/energie|warm|kracht|stroom/.test(w)) return "natuur & techniek";
  if (/emo|gevoel|boos|blij|verdriet|angst/.test(w)) return "emoties & gedrag";
  if (/woord|taal|tekst|zin/.test(w)) return "taal & communicatie";
  if (/eco|bio|plant|dier/.test(w)) return "biologie & natuur";
  if (/onderzoek|proef|test/.test(w)) return "onderzoek & wetenschap";
  return "iets dat je kunt leren en begrijpen";
}

function aiShort(word) {
  return `“${word}” gaat over ${detectCategory(word)}. Kort gezegd betekent het dat ${autoMeaningShort(word)}.`;
}

function aiLong(word) {
  return `Het woord “${word}” hoort bij het thema ${detectCategory(word)}. ${autoMeaningLong(word)} Dit helpt je beter te begrijpen wat het betekent en wanneer je het gebruikt.`;
}

function autoMeaningShort(w) {
  if (w.includes("energie")) return "het kracht geeft aan dingen of ze laat bewegen";
  if (w.includes("onderzoek")) return "je iets probeert te ontdekken of te begrijpen";
  if (w.includes("micro")) return "het heel klein is";
  if (w.includes("macro")) return "het heel groot is";
  if (w.includes("thermo")) return "het met warmte te maken heeft";
  if (w.endsWith("heid")) return "het een eigenschap of toestand beschrijft";
  return "het iets is dat je kunt leren of begrijpen";
}

function autoMeaningLong(w) {
  if (w.includes("energie"))
    return "Energie is iets dat dingen laat bewegen, warm worden of werken. Zoals elektriciteit, zonlicht of je eigen spieren.";
  if (w.includes("onderzoek"))
    return "Onderzoek betekent dat je stap voor stap probeert te ontdekken hoe iets werkt, door vragen te stellen en dingen te testen.";
  if (w.includes("thermo"))
    return "Thermo betekent warmte, en woorden met ‘thermo’ gaan vaak over temperatuur, warmte of warmtestromen.";
  if (w.includes("micro"))
    return "Micro betekent klein; heel klein. Vaak gaat het om dingen die je alleen met een microscoop kunt zien.";
  if (w.includes("macro"))
    return "Macro betekent groot; het gaat om dingen die je duidelijk kunt zien zonder hulpmiddelen.";
  if (w.endsWith("heid"))
    return "Woorden die eindigen op ‘-heid’ beschrijven meestal een eigenschap, zoals veiligheid of eerlijkheid.";
  return "Het woord kom je vaak tegen in de klas of in het dagelijks leven en helpt je om dingen beter te begrijpen.";
}

/* -----------------------------------------------------------
   4. Hoofdlogica (lokaal → online → AI)
----------------------------------------------------------- */
async function lookup() {
  const w = document.getElementById("wordInput").value.toLowerCase().trim();
  const box = document.getElementById("resultBox");

  if (!w) return;

  // 1) lokaal woordenboek
  if (dictionary[w]) {
    box.innerHTML = `
      <div class="result">
        <strong>Korte uitleg:</strong><br>${dictionary[w]}<br><br>
        <strong>Lange uitleg:</strong><br>${aiLong(w)}
      </div>`;
    return;
  }

  // 2) online (Wiktionary NL)
  const online = await fetchDutchMeaning(w);
  if (online) {
    box.innerHTML = `
      <div class="result">
        <strong>Online Nederlandse uitleg:</strong><br>${online}
      </div>`;
    return;
  }

  // 3) AI fallback
  box.innerHTML = `
    <div class="result">
      <strong>Korte AI‑uitleg:</strong><br>${aiShort(w)}<br><br>
      <strong>Lange AI‑uitleg:</strong><br>${aiLong(w)}
    </div>`;
}
</script>

</body>
</html>

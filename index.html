<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kinder Woordenhulp AI</title>
  <style>
    :root{
      --bg1:#fff7cc; --bg2:#ffdfc9; --bg3:#ffd0e1;
      --brand:#ff8a3d; --brand-d:#ff7b1e; --border:#ffb06a;
      --ink:#d26700; --muted:#6b7280;
    }
    *{box-sizing:border-box}
    body{
      font-family: Arial, system-ui;
      background: linear-gradient(var(--bg1),var(--bg2),var(--bg3));
      padding: 20px;
      color:#111;
    }
    h1{
      text-align:center; color:#d96f00; font-size:32px; margin:0 0 20px;
      text-shadow:1px 1px #ffffffaa;
    }
    .card{
      background:#fff8ee; padding:20px; border-radius:16px; border:2px solid var(--border);
      max-width: 760px; margin: auto; box-shadow:0 3px 8px #00000022;
    }
    .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    input{
      flex:1 1 320px; padding:12px; border:2px solid var(--border); border-radius:8px; font-size:16px;
    }
    .btn{
      background:var(--brand); color:#fff; border:none; padding:12px 18px; border-radius:8px; cursor:pointer; font-size:16px;
    }
    .btn:hover{background:var(--brand-d)}
    .result{
      background:#fff3db; margin-top:16px; padding:16px; border-radius:12px; border:1px solid var(--border);
      box-shadow:0 2px 5px #00000011; font-size:16px; white-space:pre-wrap;
    }
    .muted{color:var(--muted); font-size:12px; margin-top:8px}
    .err{color:#9b1c1c; background:#ffecec; border-color:#f5b7b7}
    .ok {color:#0b5d1e}
    .spinner{display:inline-block; width:1em; height:1em; border:2px solid #fff; border-right-color:transparent; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:-2px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <h1>Kinder Woordenhulp AI</h1>

  <div class="card">
    <div class="row">
      <input id="woord" placeholder="Typ een woord… (bijv. leraar, energie, onderzoek)" />
      <button class="btn" id="btnZoek" onclick="zoek()">Zoek</button>
    </div>
    <div id="hint" class="muted">
      Deze pagina draait op <strong>GitHub Pages</strong> en vraagt uitleg op bij jouw
      <strong>Netlify‑functie</strong> (AI). Werkt op elk apparaat.
    </div>
    <div id="uitkomst" class="result" style="display:none"></div>
  </div>

  <script>
    // ✅ VERVANG dit door jouw echte Netlify-site (zonder trailing slash)
    // Voorbeeld: https://woordenhulp-ai-netlify.netlify.app
    const API_BASE = "https://YOUR-NETLIFY-SITE.netlify.app";

    const elWoord   = document.getElementById("woord");
    const elBtn     = document.getElementById("btnZoek");
    const elUit     = document.getElementById("uitkomst");

    function setLoading(loading){
      elBtn.disabled = loading;
      elBtn.innerHTML = loading ? `<span class="spinner"></span> Bezig…` : `Zoek`;
    }

    function show(text, isError=false){
      elUit.style.display = "block";
      elUit.className = "result" + (isError ? " err" : "");
      elUit.textContent = text;
    }

    async function zoek(){
      const w = (elWoord.value || "").trim();
      if(!w){
        show("Tip: typ eerst een woord in het vakje.", true);
        return;
      }

      setLoading(true);
      show("Uitleg ophalen…");

      try{
        const url = `${API_BASE}/.netlify/functions/uitleg?woord=${encodeURIComponent(w)}`;
        const res = await fetch(url, { method:"GET" });

        if(!res.ok){
          const msg = `Serverfout (${res.status}). Probeer het later opnieuw.`;
          show(msg, true);
          setLoading(false);
          return;
        }

        const data = await res.json();
        if (data && data.uitleg){
          show(data.uitleg, false);
        } else {
          show("Geen uitleg ontvangen van de AI‑service.", true);
        }
      } catch(err){
        show("Kon geen verbinding maken met de AI‑service. Controleer je Netlify‑URL of internetverbinding.", true);
      } finally{
        setLoading(false);
      }
    }

    // Enter-toets activeert zoeken
    elWoord.addEventListener("keydown", e => { if(e.key === "Enter") zoek(); });
  </script>
</body>
</html>
``

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinder Woordenhulp AI</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(#fff7cc,#ffdfc9,#ffd0e1);
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #d96f00;
    font-size: 36px;
    margin-bottom: 30px;
    text-shadow: 1px 1px #ffffffaa;
  }

  .card {
    background: #fff8ee;
    padding: 20px;
    border-radius: 16px;
    border: 2px solid #ffb06a;
    max-width: 700px;
    margin: auto;
    box-shadow: 0px 3px 8px #00000022;
  }

  input {
    padding: 12px;
    border: 2px solid #ffb06a;
    border-radius: 8px;
    width: 65%;
    font-size: 17px;
  }

  .btn {
    background: #ff8a3d;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-left: 8px;
  }

  .btn:hover {
    background: #ff7b1e;
  }

  .result {
    background: #fff3db;
    margin-top: 25px;
    padding: 18px;
    border-radius: 12px;
    border: 1px solid #ffb06a;
    box-shadow: 0px 2px 5px #00000011;
    font-size: 17px;
  }

  strong { color: #d26700; }
</style>
</head>

<body>

<h1>Kinder Woordenhulp AI</h1>

<div class="card">
  <input id="wordInput" placeholder="Typ een woord..." />
  <button class="btn" onclick="lookup()">Zoek</button>

  <div id="resultBox"></div>
</div>

<script>
/* -----------------------------------------------------------
   1. Lokale basiswoordenlijst
----------------------------------------------------------- */
const dictionary = {
  "atmosfeer": "De luchtlaag rondom de aarde.",
  "fossiel": "Een versteend overblijfsel van iets dat heel oud is.",
  "strategie": "Een slim plan om iets aan te pakken.",
  "experiment": "Een proefje dat je uitvoert om iets te onderzoeken.",
  "energie": "De kracht die nodig is om dingen te laten werken.",
  "concentratie": "Je aandacht ergens volledig bij houden."
};

/* -----------------------------------------------------------
   2. ONLINE NEDERLANDSE WOORDENBOEK API (Wiktionary)
----------------------------------------------------------- */
async function fetchDutchMeaning(word) {
  try {
    const url = `https://nl.wiktionary.org/w/api.php?action=query&prop=extracts&format=json&origin=*&titles=${word}`;
    const response = await fetch(url);
    const data = await response.json();

    const pages = data.query.pages;
    const pageId = Object.keys(pages)[0];
    const extract = pages[pageId].extract;

    if (!extract) return null;

    // Extract eerste betekenis uit HTML
    // Wiktionary geeft HTML terug → we halen tekst eruit
    const temp = document.createElement("div");
    temp.innerHTML = extract;

    const firstParagraph = temp.querySelector("p");
    if (!firstParagraph) return null;

    return firstParagraph.innerText.trim();
  } catch (e) {
    return null;
  }
}

/* -----------------------------------------------------------
   3. AI fallback (werkt offline)
----------------------------------------------------------- */
function detectCategory(w) {
  if (w.match(/energie|warm|kracht|stroom/)) return "natuur & techniek";
  if (w.match(/emo|gevoel|boos|blij|verdriet/)) return "emoties & gedrag";
  if (w.match(/woord|taal|tekst|zin/)) return "taal & communicatie";
  if (w.match(/eco|bio|plant|dier/)) return "biologie & natuur";
  return "iets dat je kunt leren en begrijpen";
}

function aiShort(word) {
  return `“${word}” gaat over ${detectCategory(word)}. Kort gezegd betekent het dat ${autoMeaningShort(word)}.`;
}

function aiLong(word) {
  return `Het woord “${word}” hoort bij het thema ${detectCategory(word)}. ${autoMeaningLong(word)} Dit helpt je beter te begrijpen wat het betekent.`;
}

function autoMeaningShort(w) {
  if (w.includes("energie")) return "het kracht geeft aan dingen";
  if (w.includes("onderzoek")) return "je iets probeert te ontdekken";
  return "het iets is dat je kunt begrijpen of leren";
}

function autoMeaningLong(w) {
  if (w.includes("energie"))
    return "Energie zorgt ervoor dat dingen kunnen bewegen, warm worden of werken.";
  return "Het woord wordt gebruikt in situaties die met leren, onderzoeken of communiceren te maken hebben.";
}

/* -----------------------------------------------------------
   4. Zoekfunctie (lokale lijst → online API → AI)
----------------------------------------------------------- */
async function lookup() {
  let w = document.getElementById("wordInput").value.toLowerCase().trim();
  let box = document.getElementById("resultBox");

  if (!w) return;

  // 1. Lokale lijst
  if (dictionary[w]) {
    box.innerHTML = `
      <div class="result">
        <strong>Korte uitleg:</strong><br>${dictionary[w]}<br><br>
        <strong>Lange uitleg:</strong><br>${aiLong(w)}
      </div>`;
    return;
  }

  // 2. Online Nederlandse API
  let online = await fetchDutchMeaning(w);
  if (online) {
    box.innerHTML = `
      <div class="result">
        <strong>Online Nederlandse uitleg:</strong><br>${online}
      </div>`;
    return;
  }

  // 3. AI fallback
  box.innerHTML = `
    <div class="result">
      <strong>Korte AI‑uitleg:</strong><br>${aiShort(w)}<br><br>
      <strong>Lange AI‑uitleg:</strong><br>${aiLong(w)}
    </div>`;
}
</script>

</body>
</html>

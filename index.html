<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinder Woordenhulp AI</title>

<style>
  :root{
    --bg1:#fff7cc; --bg2:#ffdfc9; --bg3:#ffd0e1;
    --brand:#ff8a3d; --brand-d:#ff7b1e;
    --border:#ffb06a; --ink:#d26700; --muted:#6b7280;
  }
  body{
    font-family: Arial, system-ui;
    background: linear-gradient(var(--bg1),var(--bg2),var(--bg3));
    padding:20px;
  }
  h1{
    text-align:center;
    color:#d96f00;
    font-size:36px;
    margin-bottom:24px;
    text-shadow:1px 1px #ffffffaa;
  }
  .card{
    background:#fff8ee;
    padding:20px;
    border-radius:16px;
    border:2px solid var(--border);
    max-width:720px;
    margin:auto;
    box-shadow:0 3px 8px #00000022;
  }
  .row{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  input{
    padding:12px;
    border:2px solid var(--border);
    border-radius:8px;
    width:65%;
    font-size:17px;
  }
  .btn{
    background:var(--brand);
    color:white;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    border:none;
  }
  .btn:hover{ background:var(--brand-d); }
  .result{
    background:#fff3db;
    margin-top:20px;
    padding:18px;
    border-radius:12px;
    border:1px solid var(--border);
    box-shadow:0 2px 5px #00000011;
    font-size:17px;
  }
  strong{ color:var(--ink); }
  .muted{
    color:var(--muted);
    font-size:12px;
    margin-top:8px;
  }
  .badge{
    display:inline-block;
    background:#ffe3c8;
    border:1px solid #ffc69a;
    color:#8a4b00;
    font-size:11px;
    padding:3px 8px;
    border-radius:999px;
    margin-left:6px;
  }
</style>
</head>

<body>

<h1>Kinder Woordenhulp AI</h1>

<div class="card">
  <div class="row">
    <input id="wordInput" placeholder="Typ een woord... (bijv. energie, leerkracht, amateur)">
    <button class="btn" onclick="lookup()">Zoek</button>
  </div>
  <div id="resultBox" class="muted">De app zoekt: lokaal → online NL‑woordenboek → offline AI.</div>
</div>

<script>
/* Utility helpers */
const norm = s => (s||"").toLowerCase().trim()
 .normalize("NFKD").replace(/[\u0300-\u036f]/g,"");
const ucfirst = s => s.charAt(0).toUpperCase()+s.slice(1);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

/* 1. Lokale woordenlijst */
const dictionary = {
  "atmosfeer":"De luchtlaag rondom de aarde.",
  "fossiel":"Een versteend overblijfsel van iets dat heel oud is.",
  "strategie":"Een slim plan om iets op een goede manier aan te pakken.",
  "experiment":"Een proefje dat je doet om iets te onderzoeken.",
  "energie":"De kracht die dingen laat bewegen of werken.",
  "onderzoek":"Stap voor stap iets uitzoeken om het beter te begrijpen.",
  "concentratie":"Je aandacht ergens volledig bij houden.",
  "leerkracht":"Iemand die lesgeeft aan leerlingen op school."
};

/* Kleine tekst‑opschoner */
function clean(txt){
  return txt
    .replace(/\s+/g," ")
    .replace(/\((?:hulp|bestand)[^)]*\)/gi,"")
    .replace(/^Geluid:\s*/i,"")
    .replace(/^Uitspraak:\s*/i,"")
    .replace(/^Etymologie:\s*/i,"")
    .trim();
}

/* 2. WIKTIONARY NL – verbeterde extractie */
async function fetchDutchMeaning(word){
  try{
    const url =
     `https://nl.wiktionary.org/w/api.php?action=query&prop=extracts&format=json&origin=*&titles=${encodeURIComponent(word)}`;
    const res = await fetch(url);
    const data = await res.json();

    const pages = data?.query?.pages || {};
    const id = Object.keys(pages)[0];
    const extract = pages[id]?.extract;

    if(!extract) return null;

    const div = document.createElement("div");
    div.innerHTML = extract;

    /* 1) Sectie 'Betekenissen' zoeken */
    const heads = Array.from(div.querySelectorAll("span.mw-headline"));
    const target = heads.find(h =>
      /betekenis|betekenissen|definitie|definities/i.test(h.textContent||"")
    );

    if(target){
      let node = target.parentElement;
      let tries = 0;

      while(node && tries<10){
        if(node.tagName && node.tagName.toLowerCase()==="ol"){
          const li = node.querySelector("li");
          if(li){
            const t = clean(li.innerText||"");
            if(t.length>20) return t;
          }
        }
        node = node.nextElementSibling;
        tries++;
      }
    }

    /* 2) fallback: paragrafen en li’s */
    const lines = [
      ...Array.from(div.querySelectorAll("p")).map(p=>clean(p.innerText||"")),
      ...Array.from(div.querySelectorAll("li")).map(li=>clean(li.innerText||""))
    ].filter(t =>
      t.length>25 &&
      !/^(de|het)\s+[a-zA-Z]/i.test(t) &&
      !/^Geluid:/i.test(t) &&
      !/^Uitspraak:/i.test(t) &&
      !/^Etymologie:/i.test(t) &&
      !/^Afkomstig van/i.test(t) &&
      !/^Zie ook/i.test(t) &&
      !/^Synoniemen?/i.test(t) &&
      !/^Vertalingen?/i.test(t)
    );

    return lines[0] || null;

  }catch{
    return null;
  }
}

/* 3. Slimme offline AI (A+B+C) */
const THEMES = [
 {label:"school en leren",kw:["school","klas","leerkracht","leraar","docent","toets"]},
 {label:"natuur en techniek",kw:["energie","warm","kracht","stroom","thermo","elektr"]},
 {label:"taal en communicatie",kw:["woord","taal","tekst","zin","schrijf","boek"]},
 {label:"biologie en natuur",kw:["bio","eco","plant","dier","cel"]},
 {label:"aardrijkskunde en wereld",kw:["geo","aard","klimaat","weer","land"]},
 {label:"mens en maatschappij",kw:["polit","samenleving","reger","cultuur"]},
 {label:"emoties en gedrag",kw:["emo","gevoel","bang","boos","blij","verdriet"]},
 {label:"sport en beweging",kw:["sport","wedstrijd","train","team","gym"]},
 {label:"kunst en cultuur",kw:["muziek","teken","schilder","dans","toneel"]},
 {label:"wiskunde en logica",kw:["som","reken","getal","grafiek","logica"]}
];

function detectTheme(w){
  for(const t of THEMES){
    if(t.kw.some(k=>w.includes(k))) return t.label;
  }
  if(/(heid|ing|schap|kunde)$/.test(w)) return "taal en communicatie";
  return "algemene kennis";
}

const PREFIX=[
 {p:"micro",m:"heel klein"},
 {p:"macro",m:"heel groot"},
 {p:"thermo",m:"met warmte of temperatuur te maken"},
 {p:"bio",m:"over leven, planten of dieren"},
 {p:"geo",m:"over de aarde of de wereld"},
 {p:"anti",m:"tegen iets"}
];
const SUFFIX=[
 {s:"heid",m:"een eigenschap of toestand"},
 {s:"ing",m:"een handeling of het resultaat daarvan"},
 {s:"schap",m:"een groep of toestand"},
 {s:"kunde",m:"kennis over een onderwerp"},
 {s:"kracht",m:"iemand met een rol of functie"},
 {s:"meester",m:"iemand die iets onderwijst of goed kan"},
 {s:"maker",m:"iemand die iets maakt"}
];

function guessPOS(w){
  if(/en$/.test(w)) return "werkwoord";
  if(/(heid|ing|schap)$/.test(w))
    return "zelfstandig naamwoord (abstract)";
  if(/(kracht|meester|maker)$/.test(w))
    return "zelfstandig naamwoord (persoon)";
  return "zelfstandig naamwoord";
}

function morphExplain(w){
  const parts=[];
  PREFIX.forEach(p=>{ if(w.startsWith(p.p)) parts.push(`‘${p.p}-’ betekent ${p.m}`);});
  SUFFIX.forEach(s=>{ if(w.endsWith(s.s)) parts.push(`‘-${s.s}’ betekent ${s.m}`);});
  return parts.length ? parts.join(". ")+ "." : "";
}

function exampleFor(word, theme){
  const w = word;
  const pools = {
    "school en leren":[
      `De leerkracht legt ${w} uit in de klas.`,
      `We oefenen met ${w} tijdens de les.`,
      `In het werkboek staat een voorbeeld van ${w}.`
    ],
    "natuur en techniek":[
      `Je kunt onderzoeken hoe ${w} werkt.`,
      `${ucfirst(w)} speelt een rol bij proefjes.`,
      `In techniekleer leren we meer over ${w}.`
    ],
    "mens en maatschappij":[
      `${ucfirst(w)} heeft te maken met hoe mensen samenleven.`,
      `We bespreken ${w} in de les maatschappijleer.`,
      `${ucfirst(w)} zie je vaak terug in het dagelijks leven.`
    ],
    "taal en communicatie":[
      `We gebruiken ${w} om iets duidelijk uit te leggen.`,
      `In een tekst kan ${w} een belangrijk begrip zijn.`,
      `${ucfirst(w)} helpt om taal beter te begrijpen.`
    ],
    "algemene kennis":[
      `${ucfirst(w)} kom je vaak in het dagelijks leven tegen.`,
      `Het is handig om te weten wat ${w} betekent.`,
      `Vandaag gebruiken we ${w} in een voorbeeldzin.`
    ]
  };
  return pick(pools[theme] || pools["algemene kennis"]);
}

function smartAI(word){
  const w = norm(word);
  const theme = detectTheme(w);
  const pos = guessPOS(w);
  const morph = morphExplain(w);

  let shortCore =
    "het een onderwerp is dat je kunt leren begrijpen";
  if(/(kracht|meester|maker)$/.test(w))
    shortCore="het waarschijnlijk om een persoon of rol gaat";
  if(/(heid|ing|schap)$/.test(w))
    shortCore="het een eigenschap of proces beschrijft";
  if(/en$/.test(w))
    shortCore="het een handeling is";

  return {
    short: `“${word}” hoort bij ${theme}. Kort gezegd betekent het dat ${shortCore}.`,
    long: [
      `Het woord “${word}” past bij het thema ${theme}.`,
      morph ? morph : "",
      `Het lijkt te gaan om een ${pos}.`,
      exampleFor(word, theme)
    ].join(" ")
  };
}

/* -------------------------------
   4. Zoekfunctie
--------------------------------*/
async function lookup(){
  const box = document.getElementById("resultBox");
  const w = norm(document.getElementById("wordInput").value);

  if(!w) return;

  /* 1) lokaal */
  if(dictionary[w]){
    const ai = smartAI(w);
    box.innerHTML = `
      <div class="result">
        <strong>Korte uitleg (lokaal):</strong> ${dictionary[w]}
        <span class="badge">lokaal</span>
        <br><br>
        <strong>Lange AI‑uitleg:</strong> ${ai.long}
      </div>`;
    return;
  }

  /* 2) online NL woordenboek */
  box.innerHTML = `<div class="result">Zoeken in online Nederlands woordenboek…</div>`;
  const online = await fetchDutchMeaning(w);

  if(online){
    box.innerHTML = `
      <div class="result">
        <strong>Online Nederlandse uitleg:</strong> ${online}
        <span class="badge">Wiktionary NL</span>
      </div>`;
    return;
  }

  /* 3) offline AI */
  const ai = smartAI(w);
  box.innerHTML = `
    <div class="result">
      <strong>Korte AI‑uitleg:</strong> ${ai.short}
      <span class="badge">offline AI</span>
      <br><br>
      <strong>Lange AI‑uitleg:</strong> ${ai.long}
    </div>`;
}

/* ENTER‑ondersteuning */
document.getElementById("wordInput").addEventListener("keydown",
  e=>{ if(e.key==="Enter") lookup(); });
</script>

</body>
</html>

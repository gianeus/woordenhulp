/* ===========================================================
   0) Helpers
=========================================================== */
const clamp = (n,min,max)=>Math.max(min,Math.min(max,n));
const ucfirst = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
const norm = s => (s||"").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g,"").replace(/[“”‘’"]/g,'"').replace(/[—–]/g,"-").trim();

/* Kleine shuffle voor variatie */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)] }

/* ===========================================================
   1) Lokale woordenlijst (uitbreidbaar)
=========================================================== */

/* ===========================================================
   2) Online Nederlandse woordenboek‑API (Wiktionary NL)
      → verbeterde extractie van betekenis
=========================================================== */
async function fetchDutchMeaning(word, timeoutMs=2000){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), timeoutMs);

  try{
    const url = `https://nl.wiktionary.org/w/api.php?action=query&prop=extracts&format=json&origin=*&titles=${encodeURIComponent(word)}`;
    const res = await fetch(url,{signal:controller.signal});
    const data = await res.json();

    const pages = data?.query?.pages || {};
    const id = Object.keys(pages)[0];
    const extract = pages[id]?.extract;
    if(!extract) return null;

    // HTML → tekst, pak eerste echte betekenis (skip “de amateur m” e.d.)
    const div = document.createElement("div");
    div.innerHTML = extract;

    // 1) Paragrafen
    const pTexts = Array.from(div.querySelectorAll("p"))
      .map(p=>p.innerText.trim())
      .filter(t=>t.length>0);

    // 2) Lijstitems (soms staan betekenissen in lijsten)
    const liTexts = Array.from(div.querySelectorAll("li"))
      .map(li=>li.innerText.trim())
      .filter(t=>t.length>0);

    const candidates = [...pTexts, ...liTexts];

    const meaning = candidates.find(t =>
      !/^(de|het)\s+[a-zA-Z]/i.test(t) &&    // geen “de X m”
      t.length > 25 &&
      !/^Afkomstig van/i.test(t) &&
      !/^Zie ook/i.test(t) &&
      !/^Uitspraak/i.test(t) &&
      !/^Synoniemen?/i.test(t) &&
      !/^Vertalingen?/i.test(t)
    );

    return meaning || null;
  }catch(_){
    return null;
  }finally{
    clearTimeout(timer);
  }
}

   3) Slimme offline AI – A+B+C gecombineerd
   - Thema-detectie (meer domeinen, minder vals‑positief)
   - Morfologie (voor-/achtervoegsels, samenstellingen)
   - Taalsoort-gok (znw/ww/bnw/rol)
   - Sjabloon-teksten + voorbeeldzin
   - Variatie en kindvriendelijke toon (groep 7/8)
=========================================================== */

const THEMES = [

  { key:"natuur_en_techniek", label:"natuur en techniek", kw:["energie","warm","kracht","stroom","motor","elektr","thermo","robot","materiaal","metaal","chem","straling"] },
  { key:"taal_en_communicatie", label:"taal en communicatie", kw:["woord","taal","tekst","zin","spreek","lezen","schrijf","gramm","spell","boek","verhaal"] },
  { key:"biologie_en_natuur", label:"biologie en natuur", kw:["bio","eco","plant","dier","cel","bos","water","milieu","natuur","insect","zoogdier"] },
  { key:"aardrijkskunde_en_wereld", label:"aardrijkskunde en wereld", kw:["geo","aard","klimaat","weer","land","stad","provincie","kaart","atlas","rivier","berg"] },
  { key:"mens_en_maatschappij", label:"mens en maatschappij", kw:["polit","samenleving","reger","rechten","plichten","gemeente","cultuur","geschieden","maatschapp"] },
  { key:"emoties_en_gedrag", label:"emoties en gedrag", kw:["emo","gevoel","bang","boos","blij","verdriet","stress","rustig","vriend","pest","samenwerken"] },
  { key:"sport_en_beweging", label:"sport en beweging", kw:["sport","bal","train","wedstrijd","team","speler","gym","fit","hardloop","voetbal","zwem"] },
  { key:"kunst_en_cultuur", label:"kunst en cultuur", kw:["muziek","teken","schilder","dans","toneel","museum","film","fotografie","design"] },
  { key:"wiskunde_en_logica", label:"wiskunde en logica", kw:["som","reken","getal","grafiek","hoeken","meter","liter","gram","tabel","logica","patroon"] }
];

function detectTheme(word){
  const w = norm(word);
  for(const t of THEMES){
    if(t.kw.some(k=>w.includes(k))) return t.label;
  }
  // slimme default op basis van zekere eindes
  if (/(heid|ing|schap|kunde)$/.test(w)) return "taal en communicatie";
  return "algemene kennis";
}

/* 3.2 Morfologie: voor- en achtervoegsels, rollen, abstracties */

  {s:"ing",    meaning:"iets dat ontstaat door een handeling"},
  {s:"schap",  meaning:"een groep of toestand die bij iets hoort"},
  {s:"kunde",  meaning:"kennis of het vakgebied over een onderwerp"},
  {s:"kracht", meaning:"iemand die een rol of functie vervult"},
  {s:"meester",meaning:"iemand die ergens les in geeft of heel kundig is"},
  {s:"maker",  meaning:"iemand die iets maakt"},
  {s:"leraar", meaning:"iemand die lesgeeft"},
  {s:"docent", meaning:"iemand die lesgeeft"}
];

const PREFIX_MAP = [
  {p:"micro", meaning:"heel klein"},
  {p:"macro", meaning:"heel groot"},
  {p:"thermo",meaning:"heeft met warmte of temperatuur te maken"},
  {p:"bio",   meaning:"heeft met leven, planten of dieren te maken"},
  {p:"geo",   meaning:"heeft met de aarde of de wereld te maken"},
  {p:"auto",  meaning:"zelf of automatisch"},
  {p:"anti",  meaning:"tegen iets"}
];

/* 3.3 Taalsoort (grove gok) */
function guessPOS(w){
  if (/(en)$/.test(w)) return "werkwoord";         // lopen, leren
  if (/(heid|ing|schap)$/.test(w)) return "zelfstandig naamwoord (abstract)";
  if (/(baar|achtig|loos)$/.test(w)) return "bijvoeglijk naamwoord";
  if (/(kracht|meester|maker|leraar|docent|kundige)$/.test(w)) return "zelfstandig naamwoord (persoon/rol)";
  return "zelfstandig naamwoord";
}

/* 3.4 Kernbetekenis uit morfologie */
function buildMorphoMeaning(w){
  const parts = [];

  for(const {p,meaning} of PREFIX_MAP){
    if(w.startsWith(p)) parts.push(`‘${p}-’ betekent ${meaning}`);
  }
  for(const {s,meaning} of SUFFIX_MAP){
    if(w.endsWith(s)) parts.push(`‘-${s}’ betekent ${meaning}`);
  }

  return parts.length ? parts.join(". ") + "." : "";
}
